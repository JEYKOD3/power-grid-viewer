name: CI

on:
  push:
  pull_request:

jobs:
  frontend-tests:
    name: Angular unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PowerGridApi/power-grid-viewer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: PowerGridApi/power-grid-viewer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --watch=false

  api-build:
    name: .NET API build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PowerGridApi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build API
        run: dotnet build --configuration Release --no-restore
