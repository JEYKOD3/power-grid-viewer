name: CI

on:
  push:
  pull_request:

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PowerGridApi/power-grid-viewer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: PowerGridApi/power-grid-viewer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Run unit tests
        run: npm test -- --watch=false

      - name: Build production
        run: npm run build

  api:
    name: API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PowerGridApi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore PowerGridApi.Tests/PowerGridApi.Tests.csproj

      - name: Build
        run: dotnet build PowerGridApi.Tests/PowerGridApi.Tests.csproj --configuration Release --no-restore

      - name: Run tests
        run: dotnet test PowerGridApi.Tests/PowerGridApi.Tests.csproj --configuration Release --no-build
